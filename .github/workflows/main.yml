name: Implantar via FTP (Locaweb)

on:
  push:
    branches:
      - "main"
    paths:
      - "versao-html/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Implantação FTP Locaweb
        uses: locaweb/ftp-deploy@1.0.0
        with:
          host: ${{ secrets.HOST }}
          user: ${{ secrets.USER }}
          password: ${{ secrets.PASS }}
          localDir: "versao-html/dist"
          remoteDir: "public_html"
