name: Deploy via FTP (Locaweb)

on:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/main.yml"
      - "html-version/**"
  workflow_dispatch:

concurrency:
  group: deploy-locaweb-html-version
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate html-version structure
        run: |
          test -f html-version/index.php
          test -f html-version/.htaccess
          test -f html-version/includes/head.php
          test -f html-version/includes/header.php
          test -f html-version/includes/footer.php
          test -f html-version/css/style.css
          test -f html-version/js/main.js

      - name: FTP Deploy Locaweb
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASS }}
          local-dir: "html-version/"
          server-dir: "public_html/"
          dangerous-clean-slate: true
